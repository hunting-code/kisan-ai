<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Living Rivers of India — KisanAI</title>
<meta name="description" content="A decade of water quality across India's major rivers — explore pollution trends, seasonal patterns, and crop disease outbreaks in full 3D." />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💧</text></svg>">

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />

<!-- MapLibre GL — free WebGL map engine with true 3D pitch + rotation
     (replaces Leaflet: Leaflet is 2D-only and cannot tilt or rotate) -->
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<!-- GSAP for UI animations -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<!-- D3 — smooth colour interpolation on the time slider -->
<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
/* ============================================================
   DESIGN TOKENS — matched to index.html / dashboard.html
   ============================================================ */
:root {
  --ink:          #050d1a;
  --ink-2:        #071428;
  --accent:       #52B788;
  --gold:         #D4A017;
  --soil:         #6B4226;
  --river-blue:   #1A759F;
  --cream:        #F4F1DE;
  --grey:         #8a9eb0;
  --danger:       #e05252;
  --glass:        rgba(82, 183, 136, 0.06);
  --line:         rgba(82, 183, 136, 0.18);
  --glow:         rgba(82, 183, 136, 0.32);
  --font-display: "Bebas Neue", sans-serif;
  --font-body:    "Inter", sans-serif;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: var(--ink);
}

body {
  font-family: var(--font-body);
  color: var(--cream);
  -webkit-font-smoothing: antialiased;
}

a { color: inherit; text-decoration: none; }
button { cursor: pointer; font-family: var(--font-body); border: none; }
::selection { background: var(--accent); color: var(--ink); }

/* ============================================================
   MAP — full viewport WebGL canvas. Everything (tiles + rivers)
   renders in one canvas, so the colour grade filter applies to
   the whole scene uniformly.
   ============================================================ */
#map-container {
  position: fixed;
  inset: 0;
  z-index: 1;
}
#map { width: 100%; height: 100%; background: var(--ink); }

/* deep blue-teal ocean grade, matching the dashboard mesh */
.maplibregl-canvas {
  filter: brightness(0.85) contrast(1.12) saturate(1.55) hue-rotate(10deg);
}

/* grab cursor everywhere; pointer is set from JS over rivers */
.maplibregl-canvas-container.maplibregl-interactive { cursor: grab; }
.maplibregl-canvas-container.maplibregl-interactive:active { cursor: grabbing; }

/* attribution: legally required, visually minimal */
.maplibregl-ctrl-attrib {
  background: transparent !important;
  opacity: 0.25 !important;
  font-size: 9px !important;
}
.maplibregl-ctrl-attrib a { color: var(--grey) !important; }

/* ============================================================
   RIVER LABELS + ENDPOINT DOTS (DOM markers above the canvas)
   ============================================================ */
.river-label {
  font-family: var(--font-display);
  font-size: 13px;
  letter-spacing: 0.34em;
  color: rgba(244, 241, 222, 0.55);
  text-shadow: 0 0 12px rgba(82, 183, 136, 0.55), 0 2px 8px rgba(0,0,0,.8);
  white-space: nowrap;
  pointer-events: none;
  transition: color 0.3s ease, text-shadow 0.3s ease, opacity 0.4s ease;
  transform: translateY(-16px);
}
.river-label.lit {
  color: var(--cream);
  text-shadow: 0 0 18px rgba(120, 220, 180, 0.9), 0 2px 8px rgba(0,0,0,.9);
}

.endpoint-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: rgba(140, 230, 190, 0.9);
  box-shadow: 0 0 10px rgba(82,183,136,.9), 0 0 26px rgba(82,183,136,.5);
  animation: endpointPulse 2.6s ease-in-out infinite;
  pointer-events: none;
  transition: opacity 0.4s ease;
}
@keyframes endpointPulse {
  0%, 100% { transform: scale(1);   opacity: .85; }
  50%      { transform: scale(1.5); opacity: 1;   }
}

/* expanding ring shown at the click point on a river */
.click-ring {
  width: 18px; height: 18px;
  border: 2px solid #7de8b8;
  border-radius: 50%;
  pointer-events: none;
  animation: ringExpand 0.7s ease-out forwards;
}
@keyframes ringExpand {
  from { transform: scale(1);   opacity: 1; }
  to   { transform: scale(4.5); opacity: 0; }
}

/* pulsing flow-direction arrows (rotate WITH the map via marker options) */
.flow-arrow {
  color: #7de8b8;
  font-size: 13px;
  text-shadow: 0 0 8px rgba(82,183,136,.9);
  animation: arrowPulse 2.4s ease-in-out infinite;
  opacity: 0;
  pointer-events: none;
}
@keyframes arrowPulse {
  0%   { opacity: 0;   }
  20%  { opacity: 0.8; }
  75%  { opacity: 0.8; }
  100% { opacity: 0;   }
}

/* disease outbreak blobs */
.outbreak-blob {
  border-radius: 50%;
  cursor: pointer;
  animation: blobPulse 3s ease-in-out infinite;
}
@keyframes blobPulse {
  0%, 100% { transform: scale(1);    opacity: .7; }
  50%      { transform: scale(1.09); opacity: .9; }
}

/* ============================================================
   FILM GRAIN — matches index.html exactly
   ============================================================ */
#grain {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 9000;
  pointer-events: none;
  opacity: 0.045;
  image-rendering: pixelated;
}

/* ============================================================
   AURORA WASH — living blue→teal→green mesh, screened over the
   scene so the page shares the dashboard's colour atmosphere
   ============================================================ */
#aurora {
  position: fixed;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  mix-blend-mode: screen;
  background:
    radial-gradient(ellipse 85vw 75vh at 12% 15%,  rgba(26, 58, 107, .50), transparent 62%),
    radial-gradient(ellipse 70vw 85vh at 88% 85%,  rgba(13, 74, 58,  .45), transparent 60%),
    radial-gradient(ellipse 60vw 60vh at 50% 45%,  rgba(10, 45, 74,  .32), transparent 58%),
    radial-gradient(ellipse 55vw 50vh at 80% 12%,  rgba(20, 90, 80,  .28), transparent 64%);
  animation: auroraDrift 26s ease-in-out infinite alternate;
}
@keyframes auroraDrift {
  0%   { transform: translate3d(0,0,0)      scale(1);    }
  100% { transform: translate3d(2%, -2%, 0) scale(1.06); }
}

/* ============================================================
   RADAR SWEEP — slow rotating light beam, live-monitoring feel
   ============================================================ */
#radar {
  position: fixed;
  left: 50%;
  top: 50%;
  width: 160vmax;
  height: 160vmax;
  margin: -80vmax 0 0 -80vmax;
  z-index: 2;
  pointer-events: none;
  border-radius: 50%;
  background: conic-gradient(
    from 0deg,
    transparent 0deg,
    transparent 336deg,
    rgba(82, 183, 136, 0.05) 350deg,
    rgba(120, 220, 180, 0.10) 358deg,
    transparent 360deg
  );
  animation: radarSpin 16s linear infinite;
  opacity: 0.8;
}
@keyframes radarSpin { to { transform: rotate(360deg); } }

/* ============================================================
   VIGNETTE — frames the scene, pulses during camera flight
   ============================================================ */
#vignette {
  position: fixed;
  inset: 0;
  z-index: 3;
  pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 34%, rgba(2, 6, 16, 0.62) 100%);
  opacity: 0.42;
}

/* ============================================================
   AMBIENT PARTICLES
   ============================================================ */
#particles {
  position: fixed;
  inset: 0;
  z-index: 3;
  pointer-events: none;
}

/* ============================================================
   LOADING SCREEN
   ============================================================ */
#loading-screen {
  position: fixed;
  inset: 0;
  z-index: 10000;
  background:
    radial-gradient(ellipse 70vw 60vh at 30% 20%, rgba(26,58,107,.5), transparent 60%),
    radial-gradient(ellipse 60vw 70vh at 75% 80%, rgba(13,74,58,.45), transparent 60%),
    var(--ink);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
  transition: opacity 0.9s ease;
}
#loading-screen.fade-out { opacity: 0; pointer-events: none; }

.loading-text {
  font-family: var(--font-display);
  font-size: 26px;
  letter-spacing: 0.4em;
  color: var(--cream);
}
.loading-text .lt-ch { display: inline-block; opacity: 0; transform: translateY(14px); }

.loading-sub {
  font-size: 10px;
  letter-spacing: 0.3em;
  color: var(--grey);
  text-transform: uppercase;
  margin-top: -16px;
}

.loading-bar-track {
  width: 260px;
  height: 2px;
  background: rgba(82,183,136,.14);
  border-radius: 2px;
  overflow: hidden;
}
.loading-bar-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--river-blue), var(--accent));
  border-radius: 2px;
  box-shadow: 0 0 12px rgba(82,183,136,.7);
  transition: width 0.25s ease;
}

/* ============================================================
   TOP NAV — glass bar
   ============================================================ */
#topnav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 8000;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 28px;
  background: rgba(5, 13, 26, 0.66);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--line);
  height: 56px;
}

.nav-back {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 10px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--cream);
  opacity: 0.75;
  transition: opacity 0.2s, color 0.2s;
  white-space: nowrap;
}
.nav-back:hover { opacity: 1; color: var(--accent); }

/* sits in the flex row between logo and toggle — can never overlap */
.nav-title {
  flex: 1;
  text-align: center;
  font-family: var(--font-display);
  font-size: 15px;
  letter-spacing: 0.32em;
  color: var(--cream);
  pointer-events: none;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  padding: 0 18px;
}

.layer-toggle {
  display: flex;
  border: 1px solid var(--line);
  border-radius: 999px;
  overflow: hidden;
  background: rgba(5, 13, 26, 0.4);
}
.layer-btn {
  padding: 6px 16px;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--grey);
  background: transparent;
  transition: background 0.25s, color 0.25s;
  white-space: nowrap;
}
.layer-btn.active { background: var(--accent); color: var(--ink); font-weight: 600; }

.layer-toggle-mobile {
  display: none;
  background: rgba(5,13,26,0.6);
  border: 1px solid var(--line) !important;
  border-radius: 8px;
  padding: 7px 10px;
  color: var(--cream);
  font-size: 15px;
}

/* ============================================================
   MODE LABEL — top-left pill
   ============================================================ */
#mode-label {
  position: fixed;
  top: 68px;
  left: 18px;
  z-index: 7000;
  background: rgba(5,13,26,0.7);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 6px 15px;
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--cream);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

/* ============================================================
   ROTATE HINT — bottom-left pill telling users about 3D controls
   ============================================================ */
#rotate-hint {
  position: fixed;
  bottom: 24px;
  left: 18px;
  z-index: 7000;
  background: rgba(5,13,26,0.7);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 7px 16px;
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--grey);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  transition: opacity 1s ease;
}
#rotate-hint b { color: var(--accent); font-weight: 600; }

/* ============================================================
   LEGEND — top-right glass card
   ============================================================ */
#legend {
  position: fixed;
  top: 68px;
  right: 18px;
  z-index: 7000;
  background: rgba(5,13,26,0.76);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 14px 18px;
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  min-width: 175px;
}
.legend-title {
  font-size: 8.5px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--grey);
  margin-bottom: 10px;
}
.legend-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
  font-size: 11px;
  color: var(--cream);
  opacity: 0.88;
}
.legend-swatch {
  width: 28px;
  height: 3px;
  border-radius: 2px;
  flex-shrink: 0;
  box-shadow: 0 0 8px currentColor;
}
.legend-note {
  font-size: 8px;
  color: var(--grey);
  margin-top: 10px;
  opacity: 0.6;
  line-height: 1.5;
}

/* ============================================================
   TIME MACHINE — bottom-center smooth slider
   ============================================================ */
#time-panel {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 7000;
  background: rgba(5,13,26,0.76);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 14px 28px 12px;
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  min-width: 400px;
  text-align: center;
  box-shadow: 0 18px 50px rgba(0,0,0,.45);
}

#year-display {
  font-family: var(--font-display);
  font-size: 42px;
  color: var(--cream);
  line-height: 1;
  margin-bottom: 10px;
  letter-spacing: 0.06em;
  text-shadow: 0 0 24px rgba(82,183,136,.35);
}

#year-slider {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 3px;
  border-radius: 2px;
  outline: none;
  cursor: pointer;
  background: linear-gradient(to right, #52B788 0%, #D4A017 55%, #e05252 100%);
  box-shadow: 0 0 10px rgba(82,183,136,.25);
}
#year-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #9fe8c6, var(--accent));
  box-shadow: 0 0 14px rgba(82,183,136,0.75), 0 0 0 4px rgba(82,183,136,0.15);
  cursor: grab;
  transition: box-shadow 0.2s;
}
#year-slider::-webkit-slider-thumb:active { cursor: grabbing; }
#year-slider::-webkit-slider-thumb:hover {
  box-shadow: 0 0 22px rgba(82,183,136,0.9), 0 0 0 6px rgba(82,183,136,0.2);
}
#year-slider::-moz-range-thumb {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 14px rgba(82,183,136,0.75);
  cursor: grab;
  border: none;
}

.slider-ticks {
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
  font-size: 8px;
  color: var(--grey);
  opacity: 0.65;
}

.play-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-top: 10px;
}
#play-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1px solid var(--line) !important;
  background: rgba(82,183,136,0.1);
  color: var(--accent);
  font-size: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, box-shadow 0.2s;
}
#play-btn:hover { background: rgba(82,183,136,0.2); box-shadow: 0 0 14px rgba(82,183,136,.4); }
#play-btn.playing { background: rgba(82,183,136,0.22); box-shadow: 0 0 14px rgba(82,183,136,.5); }

.trend-caption {
  font-size: 9.5px;
  color: var(--grey);
  letter-spacing: 0.1em;
  opacity: 0.8;
}

/* ============================================================
   CAMERA CONTROLS — bottom-right: zoom, compass reset, 3D toggle
   ============================================================ */
#cam-controls {
  position: fixed;
  bottom: 80px;
  right: 18px;
  z-index: 7000;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.cam-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1px solid var(--line) !important;
  background: rgba(5,13,26,0.66);
  color: var(--cream);
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  transition: background 0.2s, color 0.2s, box-shadow 0.2s;
}
.cam-btn:hover {
  background: rgba(82,183,136,0.14);
  color: var(--accent);
  box-shadow: 0 0 16px rgba(82,183,136,.35);
}
.cam-btn.small-icon { font-size: 15px; }
/* the compass needle rotates to mirror the map's bearing */
#compass-needle {
  display: inline-block;
  transition: transform 0.2s linear;
  font-size: 17px;
}

/* ============================================================
   RIVER DETAIL PANEL — slides in from right
   ============================================================ */
#river-panel {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  width: min(420px, 92vw);
  z-index: 8600;
  background: linear-gradient(170deg, rgba(8, 22, 42, 0.97), rgba(4, 11, 22, 0.99));
  border-left: 1px solid var(--line);
  transform: translateX(100%);
  transition: transform 0.5s cubic-bezier(0.2,0.8,0.2,1);
  overflow-y: auto;
  padding: clamp(24px, 4vw, 40px);
  scrollbar-width: thin;
  scrollbar-color: var(--line) transparent;
}
#river-panel.open { transform: translateX(0); }
#river-panel::-webkit-scrollbar { width: 4px; }
#river-panel::-webkit-scrollbar-track { background: transparent; }
#river-panel::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }

.panel-close {
  position: absolute;
  top: 16px;
  right: 16px;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1px solid var(--line) !important;
  background: transparent;
  color: var(--grey);
  font-size: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  transition: color 0.2s, border-color 0.2s;
}
.panel-close:hover { color: var(--cream); border-color: rgba(82,183,136,0.4) !important; }

.p-river-name {
  font-family: var(--font-display);
  font-size: 44px;
  line-height: 1;
  background: linear-gradient(90deg, var(--accent), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-top: 8px;
  margin-bottom: 6px;
}
.p-subtitle {
  font-size: 11px;
  color: var(--grey);
  letter-spacing: 0.15em;
  margin-bottom: 10px;
}
.p-year-badge {
  display: inline-block;
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  padding: 3px 11px;
  border-radius: 999px;
  border: 1px solid var(--line);
  color: var(--grey);
  margin-bottom: 18px;
}
.p-wqi-block {
  display: flex;
  align-items: flex-end;
  gap: 14px;
  margin-bottom: 4px;
}
.p-wqi-num {
  font-family: var(--font-display);
  font-size: 72px;
  line-height: 1;
  letter-spacing: -0.02em;
  text-shadow: 0 0 30px currentColor;
}
.p-wqi-label {
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-weight: 600;
  padding-bottom: 10px;
}
.p-divider { height: 1px; background: var(--line); margin: 18px 0; }
.p-section-title {
  font-size: 8.5px;
  letter-spacing: 0.34em;
  text-transform: uppercase;
  color: var(--grey);
  margin-bottom: 12px;
}

.param-row { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
.param-name { font-size: 10px; color: var(--grey); width: 96px; flex-shrink: 0; }
.param-track {
  flex: 1;
  height: 4px;
  background: rgba(255,255,255,0.07);
  border-radius: 2px;
  overflow: hidden;
}
.param-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.7s cubic-bezier(0.2,0.8,0.2,1);
  box-shadow: 0 0 6px currentColor;
}
.param-val {
  font-size: 9.5px;
  color: var(--cream);
  opacity: 0.65;
  width: 52px;
  text-align: right;
  flex-shrink: 0;
}

.month-row {
  display: flex;
  justify-content: space-between;
  font-size: 7.5px;
  color: var(--grey);
  opacity: 0.55;
  margin-top: 4px;
}

.city-row {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 6px 0;
  border-bottom: 1px solid rgba(82,183,136,0.07);
  font-size: 12px;
  color: var(--cream);
  opacity: 0.82;
}
.city-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  flex-shrink: 0;
}

.rec-box {
  margin-top: 18px;
  padding: 13px 16px;
  border-radius: 10px;
  background: rgba(255,255,255,0.035);
  border-left: 3px solid var(--accent);
  font-size: 12px;
  line-height: 1.65;

  .range(["#52B788", "#D4A017", "#e0954a", "#e05252"])

  .interpolate(d3.interpolateRgb);

// WQI at a FRACTIONAL year (e.g. 2019.4) — blend of the two nearest readings
function wqiAt(id, yearF){
  var y0 = Math.floor(yearF), y1 = Math.min(y0 + 1, 2025);
  var t = yearF - y0;
  var a = riverData[id].yearlyWQI[y0], b = riverData[id].yearlyWQI[y1];
  return a + (b - a) * t;
}

function wqiLabel(wqi) {
  if (wqi <= 25) return "SAFE FOR IRRIGATION";
  if (wqi <= 50) return "MODERATE — CAUTION ADVISED";
  if (wqi <= 75) return "POLLUTED — TREAT BEFORE USE";
  return "SEVERELY POLLUTED";
}

function wqiAdvice(wqi, name) {
  if (wqi <= 25) return name + " water is within safe limits for direct irrigation. Monitor during monsoon months when runoff increases pollutant load.";
  if (wqi <= 50) return "Exercise caution with " + name + " water. Avoid use on leafy vegetables. Suitable for flood irrigation of paddy and sugarcane with monthly monitoring.";
  if (wqi <= 75) return name + " water is polluted and unsafe for direct irrigation. Treat with sedimentation and chlorination. Consider rainwater harvesting as an alternative.";
  return name + " water must NOT be used for irrigation without full treatment. Risk of crop contamination and long-term soil degradation. Contact your local KVK immediately.";
}

function outbreakStyle(severity) {
  var map = {
    high:   { r: 70, bg: "rgba(224,82,82,0.60)"  },
    medium: { r: 50, bg: "rgba(224,149,74,0.52)" },
    low:    { r: 34, bg: "rgba(212,160,23,0.44)" }
  };
  return map[severity] || map.low;
}

// convert our [lat,lng] arrays into MapLibre's [lng,lat] order
function toLngLat(coords){
  return coords.map(function(c){ return [c[1], c[0]]; });

   ============================================================ */
(function grain(){
  var c = document.getElementById("grain");
  var ctx = c.getContext("2d");
  var S = 140;
  c.width = S; c.height = S;
  var img = ctx.createImageData(S, S);
  var d = img.data;
  function frame(){
    for (var i = 0; i < d.length; i += 4){
      var v = (Math.random() * 255) | 0;
      d[i] = v; d[i+1] = v; d[i+2] = v; d[i+3] = 34;
    }
    ctx.putImageData(img, 0, 0);
  }
  frame();
  if (!reducedMotion) setInterval(frame, 80);
})();

/* ============================================================
   CURSOR GLOW — river-blue tint (vs. green on index.html)
   ============================================================ */
(function cursorGlow(){
  if (isMobile) return;

  var glow = document.createElement("div");
  glow.style.cssText = [
    "position:fixed",
    "width:380px",
    "height:380px",
    "border-radius:50%",
    "pointer-events:none",
    "z-index:9999",
    "background:radial-gradient(circle, rgba(26,117,159,.10) 0%, rgba(26,117,159,.03) 40%, transparent 70%)",
    "transform:translate(-50%,-50%)",
    "opacity:0",
    "transition:opacity .6s ease",
    "will-change:transform,opacity"
  ].join(";");
  document.body.appendChild(glow);

  var mouseX = 0, mouseY = 0, glowX = 0, glowY = 0;
  var idleTimer = null, visible = false, rafId = null;

  function lerp(a, b, t){ return a + (b - a) * t; }

  function animateGlow(){
    glowX = lerp(glowX, mouseX, 0.12);
    glowY = lerp(glowY, mouseY, 0.12);
    glow.style.left = glowX + "px";
    glow.style.top  = glowY + "px";
    rafId = requestAnimationFrame(animateGlow);
  }

  document.addEventListener("mousemove", function(e){
    mouseX = e.clientX;
    mouseY = e.clientY;
    if (!visible){ visible = true; glow.style.opacity = "1"; if (!rafId) animateGlow(); }
    clearTimeout(idleTimer);
    idleTimer = setTimeout(function(){ visible = false; glow.style.opacity = "0"; }, 2200);
  });

  document.addEventListener("mouseleave", function(){
    clearTimeout(idleTimer);
    visible = false;
    glow.style.opacity = "0";
  });

  document.addEventListener("visibilitychange", function(){
    if (document.hidden){ cancelAnimationFrame(rafId); rafId = null; }
    else if (visible) animateGlow();
  });
})();

/* ============================================================
   AMBIENT PARTICLES — slow upward drift
   ============================================================ */
(function particles(){
  if (reducedMotion) return;

  var canvas = document.getElementById("particles");
  var ctx = canvas.getContext("2d");
  var COUNT = isMobile ? 25 : 80;
  var dots = [];

  function resize(){
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener("resize", resize);

  for (var i = 0; i < COUNT; i++){
    dots.push({
      x:       Math.random() * window.innerWidth,
      y:       Math.random() * window.innerHeight,
      r:       Math.random() * 1.5 + 0.4,
      speed:   Math.random() * 0.28 + 0.08,
      opacity: Math.random() * 0.16 + 0.04
    });
  }

  function draw(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (var j = 0; j < dots.length; j++){
      var d = dots[j];
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(82,183,136," + d.opacity + ")";
      ctx.fill();
      d.y -= d.speed;
      if (d.y < -4){ d.y = canvas.height + 4; d.x = Math.random() * canvas.width; }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ============================================================
   3D MAP INIT — MapLibre GL with pitch + rotation enabled.
   Controls, exactly like Google Maps:
     • drag            → pan
     • right-drag      → rotate + tilt          (desktop)
     • ctrl+drag       → rotate + tilt          (desktop)
     • two-finger twist→ rotate, two-finger drag up/down → tilt (mobile)
     • scroll          → smooth fractional zoom
   ============================================================ */
var START_PITCH = reducedMotion ? 35 : (isMobile ? 42 : 52);

var map = new maplibregl.Map({
  container: "map",
  // Carto's free Dark Matter GL style — no API key needed
  style: "https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json",
  center: [80.5, 22.5],
  zoom: reducedMotion ? 4.4 : 3.2,   // intro flight starts zoomed out
  pitch: reducedMotion ? START_PITCH : 0,
  bearing: 0,
  minZoom: 3,
  maxZoom: 11,
  maxPitch: 70,
  antialias: true,
  attributionControl: { compact: true }
});

// touch gestures for 3D on mobile
map.touchZoomRotate.enable();
map.touchPitch.enable();
map.dragRotate.enable();

// intentional global (same pattern as window.__lenis on index.html) —
// lets other scripts / the console drive the camera for debugging
window.__map = map;

/* ============================================================
   STATE
   ============================================================ */
var state = { yearF: 2020 };
var currentMode    = "water";
var selectedId     = null;
var playTween      = null;
var riverIds       = Object.keys(riverData);
var labelMarkers   = {};          // id → maplibregl.Marker (river name)
var endpointMarkers= [];
var outbreakMarkers= [];
var arrowMarkers   = [];
var displayedYear  = 2020;
var lastPanelYear  = 2020;

/* ============================================================
   RIVER LAYERS — per river: glow bed, core line, comet pulses,
   invisible fat hit line. All drawn in WebGL, so they tilt and
   rotate WITH the terrain — true 3D, no CSS fakery.
   ============================================================ */
function addRiverLayers(){
  riverIds.forEach(function(id){
    var r = riverData[id];
    var col = wqiColor(wqiAt(id, state.yearF));

    map.addSource("src-" + id, {
      type: "geojson",
      data: {
        type: "Feature",
        properties: {},
        geometry: { type: "LineString", coordinates: toLngLat(r.coords) }
      }
    });

    // 1. glow bed — wide, heavily blurred (native GL blur, GPU-cheap)
    map.addLayer({
      id: "glow-" + id,
      type: "line",
      source: "src-" + id,
      layout: { "line-cap": "round", "line-join": "round" },
      paint: {
        "line-color": col,
        "line-width": 14,
        "line-blur": 6,
        "line-opacity": 0,                       // intro fades this in
        "line-opacity-transition": { duration: 800 },
        "line-color-transition":   { duration: 300 }
      }
    });

    // 2. bright core with animated flowing dashes
    map.addLayer({
      id: "core-" + id,
      type: "line",
      source: "src-" + id,
      layout: { "line-cap": "round", "line-join": "round" },
      paint: {
        "line-color": col,
        "line-width": 3.5,
        "line-opacity": 0,
        "line-opacity-transition": { duration: 800 },
        "line-color-transition":   { duration: 300 },
        "line-width-transition":   { duration: 300 }
      }
    });

    // 3. white-hot comets racing along the river
    map.addLayer({
      id: "pulse-" + id,
      type: "line",
      source: "src-" + id,
      layout: { "line-cap": "round", "line-join": "round" },
      paint: {
        "line-color": "#d9fff0",
        "line-width": 2.5,
        "line-opacity": 0,
        "line-opacity-transition": { duration: 800 }
      }
    });

    // 4. invisible fat line — the touch/click target
    map.addLayer({
      id: "hit-" + id,
      type: "line",
      source: "src-" + id,
      paint: { "line-color": "#000", "line-width": 24, "line-opacity": 0.01 }
    });
  });
}

/* ============================================================
   DASH FLOW ANIMATION — MapLibre can't CSS-animate dashes, so
   we step the dasharray pattern each tick. makeDashSeq() builds
   one full cycle of patterns for a moving dash of length `dash`
   inside a repeating period `total`.
   ============================================================ */
function makeDashSeq(total, dash, steps){
  var seq = [];
  for (var s = 0; s < steps; s++){
    var o = (s / steps) * total;              // current offset of the dash
    if (o + dash <= total){
      // [lead-dash 0, gap to dash, dash, trailing gap]
      seq.push([0, o, dash, total - o - dash]);
    } else {
      // dash wraps around the period boundary
      var over = o + dash - total;
      seq.push([over, total - dash, dash - over, 0]);
    }
  }
  return seq;
}

var FLOW_STEPS = 24;
var flowSeq  = makeDashSeq(7,  3.5, FLOW_STEPS);   // core: steady flow
var cometSeq = makeDashSeq(26, 0.9, FLOW_STEPS);   // pulse: sparse fast comets
var flowPhase = 0;

function startFlowAnimation(){
  if (reducedMotion) return;
  setInterval(function(){
    flowPhase = (flowPhase + 1) % FLOW_STEPS;
    var cometPhase = (flowPhase * 2) % FLOW_STEPS;  // comets travel 2× faster
    riverIds.forEach(function(id){
      map.setPaintProperty("core-"  + id, "line-dasharray", flowSeq[flowPhase]);
      map.setPaintProperty("pulse-" + id, "line-dasharray", cometSeq[cometPhase]);
    });
  }, 70);
}

/* ============================================================
   LABELS + ENDPOINT DOTS — DOM markers that track the 3D camera
   ============================================================ */
function addMarkers(){
  riverIds.forEach(function(id){
    var r = riverData[id];

    var el = document.createElement("div");
    el.className = "river-label";
    el.id = "label-" + id;
    el.textContent = r.name.toUpperCase();
    var mid = r.coords[Math.floor(r.coords.length / 2)];
    labelMarkers[id] = new maplibregl.Marker({ element: el })
      .setLngLat([mid[1], mid[0]])
      .addTo(map);

    [r.coords[0], r.coords[r.coords.length - 1]].forEach(function(pt, k){
      var dot = document.createElement("div");
      dot.className = "endpoint-dot";
      dot.style.animationDelay = (k * 1.3) + "s";
      endpointMarkers.push(
        new maplibregl.Marker({ element: dot })
          .setLngLat([pt[1], pt[0]])
          .addTo(map)
      );
    });
  });
}

/* ============================================================
   YEAR ENGINE — applies a fractional year to every river.
   Paint transitions (300ms) make colours glide, GPU-side.
   ============================================================ */
var yearDisplay = document.getElementById("year-display");
var slider = document.getElementById("year-slider");

function applyYear(){
  var yf = state.yearF;

  riverIds.forEach(function(id){
    var col = wqiColor(wqiAt(id, yf));
    map.setPaintProperty("core-" + id, "line-color", col);
    map.setPaintProperty("glow-" + id, "line-color", col);
  });

  var yr = Math.round(yf);
  if (yr !== displayedYear){
    displayedYear = yr;
    yearDisplay.textContent = yr;
    slider.setAttribute("aria-valuenow", yr);
    if (!reducedMotion){
      gsap.fromTo(yearDisplay, { scale: 1.12 }, { scale: 1, duration: 0.35, ease: "power2.out" });
    }
    if (selectedId && currentMode === "water" && yr !== lastPanelYear){
      lastPanelYear = yr;
      showRiverPanel(selectedId);
    }
  }
}

slider.addEventListener("input", function(){
  stopPlay();
  state.yearF = parseFloat(this.value);
  applyYear();
});

/* ============================================================
   PLAY — one continuous tween across the decade
   ============================================================ */
var playBtn = document.getElementById("play-btn");

function stopPlay(){
  if (playTween){ playTween.kill(); playTween = null; }
  playBtn.textContent = "▶";
  playBtn.classList.remove("playing");
  playBtn.setAttribute("aria-label", "Play year animation");
}

function startPlay(){
  playBtn.textContent = "⏸";
  playBtn.classList.add("playing");
  playBtn.setAttribute("aria-label", "Pause year animation");

  function sweep(){
    var remaining = 2025 - state.yearF;
    playTween = gsap.to(state, {
      yearF: 2025,
      duration: Math.max(remaining * 1.3, 0.1),
      ease: "none",
      onUpdate: function(){
        slider.value = state.yearF;
        applyYear();
      },
      onComplete: function(){
        state.yearF = 2015;
        sweep();
      }
    });
  }
  sweep();
}

playBtn.addEventListener("click", function(){
  playTween ? stopPlay() : startPlay();
});

/* ============================================================
   RIVER SELECTION — true 3D cinematic camera
   ============================================================ */
function highlightRiver(id){
  riverIds.forEach(function(k){
    var sel = (k === id);
    map.setPaintProperty("core-" + k, "line-width",  sel ? 6 : 3.5);
    map.setPaintProperty("glow-" + k, "line-width",  sel ? 20 : 14);
    map.setPaintProperty("glow-" + k, "line-opacity", sel ? 0.75 : 0.35);
  });
}

function unhighlightAll(){
  riverIds.forEach(function(k){
    map.setPaintProperty("core-" + k, "line-width", 3.5);
    map.setPaintProperty("glow-" + k, "line-width", 14);
    map.setPaintProperty("glow-" + k, "line-opacity", 0.35);
  });
}

function onRiverClick(id, lngLat){
  selectedId = id;
  lastPanelYear = displayedYear;

  // STEP 1 — instant highlight + expanding ring at click point
  highlightRiver(id);
  if (lngLat) spawnClickRing(lngLat);

  // STEP 2 — REAL 3D camera swoop: frame the river's bounds,
  // then fly there with a fresh pitch + slight random bearing,
  // like an aerial camera banking over the valley
  var coords = toLngLat(riverData[id].coords);
  var bounds = coords.reduce(function(b, c){ return b.extend(c); },
    new maplibregl.LngLatBounds(coords[0], coords[0]));

  var cam = map.cameraForBounds(bounds, { padding: 90 });
  if (cam){
    map.flyTo({
      center:  cam.center,
      zoom:    cam.zoom - 0.15,
      pitch:   isMobile ? 45 : 58,
      bearing: (Math.random() * 30) - 15,        // gentle random bank angle
      duration: reducedMotion ? 0 : (isMobile ? 1300 : 2100),
      curve: 1.42,                               // swooping arc height
      essential: true
    });
  }

  // STEP 3 — vignette pulse synced with the flight
  if (!reducedMotion){
    gsap.timeline()
      .to("#vignette", { opacity: 0.68, duration: 0.4, ease: "power2.in" })
      .to("#vignette", { opacity: 0.42, duration: 1.4, ease: "power3.out" }, "+=0.2");
  }

  // STEP 4 — panel slides in as the camera settles
  setTimeout(function(){ showRiverPanel(id); }, reducedMotion ? 0 : 1500);

  // STEP 5 — flow-direction arrows (rotate WITH the map, so they
  // stay geographically correct at any bearing)
  clearFlowArrows();
  setTimeout(function(){ addFlowArrows(id); }, reducedMotion ? 0 : 1700);
}

/* expanding ring marker at the click point */
function spawnClickRing(lngLat){
  var el = document.createElement("div");
  el.className = "click-ring";
  var m = new maplibregl.Marker({ element: el }).setLngLat(lngLat).addTo(map);
  setTimeout(function(){ m.remove(); }, 750);
}

/* ============================================================
   FLOW ARROWS — markers with rotationAlignment:"map" rotate and
   tilt together with the 3D scene
   ============================================================ */
function clearFlowArrows(){
  arrowMarkers.forEach(function(m){ m.remove(); });
  arrowMarkers = [];
}

function addFlowArrows(id){
  var coords = riverData[id].coords;
  var maxArrows = Math.min(5, coords.length - 1);
  var step = Math.max(1, Math.floor((coords.length - 1) / maxArrows));

  for (var i = 0; i < coords.length - 1 && arrowMarkers.length < maxArrows; i += step){
    var a = coords[i], b = coords[i + 1];
    var mid = [(a[1] + b[1]) / 2, (a[0] + b[0]) / 2];   // [lng, lat]

    // geographic bearing of this segment (0 = north, clockwise)
    var dLat = b[0] - a[0], dLng = b[1] - a[1];
    var angle = Math.atan2(dLng, dLat) * 180 / Math.PI;

    var el = document.createElement("div");
    el.className = "flow-arrow";
    el.textContent = "▲";
    el.style.animationDelay = (arrowMarkers.length * 0.4) + "s";

    arrowMarkers.push(
      new maplibregl.Marker({
        element: el,
        rotation: angle,
        rotationAlignment: "map",   // stays correct when the user rotates
        pitchAlignment: "map"       // lies flat on the tilted ground plane
      }).setLngLat(mid).addTo(map)
    );
  }
}

/* ============================================================
   SIDE PANEL — river water quality detail
   ============================================================ */
function showRiverPanel(id){
  var r = riverData[id];
  var wqi = Math.round(wqiAt(id, displayedYear));
  var col = wqiColor(wqi);

  var paramHtml = Object.keys(r.parameters).map(function(key){
    var p = r.parameters[key];
    var barCol = p.stress < 33 ? "#52B788" : p.stress < 66 ? "#D4A017" : "#e05252";
    return '<div class="param-row">' +
      '<span class="param-name">' + key + '</span>' +
      '<div class="param-track"><div class="param-fill" style="width:' + p.stress + '%;background:' + barCol + ';color:' + barCol + '"></div></div>' +
      '<span class="param-val">' + p.value + (p.unit ? " " + p.unit : "") + '</span>' +
    '</div>';
  }).join("");

  var months = r.seasonalWQI;
  var svgW = 320, svgH = 66;
  var lo = Math.min.apply(null, months), hi = Math.max.apply(null, months);
  var range = Math.max(hi - lo, 1);
  var pts = months.map(function(v, i){
    return ((i / 11) * svgW).toFixed(1) + "," +
           (svgH - ((v - lo) / range) * (svgH - 10)).toFixed(1);
  }).join(" ");
  var circles = months.map(function(v, i){
    return '<circle cx="' + ((i / 11) * svgW).toFixed(1) + '"' +
           ' cy="' + (svgH - ((v - lo) / range) * (svgH - 10)).toFixed(1) + '"' +
           ' r="3" fill="' + wqiColor(v) + '"/>';
  }).join("");

  var seasonSvg = '<svg style="width:100%;height:' + svgH + 'px" viewBox="0 0 ' + svgW + ' ' + svgH + '" preserveAspectRatio="none">' +
    '<polyline points="' + pts + '" fill="none" stroke="' + col + '" stroke-width="2" stroke-linejoin="round"/>' +
    circles + '</svg>';

  var citiesHtml = r.cities.map(function(c){
    return '<div class="city-row"><div class="city-dot"></div>' + c + '</div>';
  }).join("");

  document.getElementById("panel-content").innerHTML =
    '<div class="p-river-name">' + r.name.toUpperCase() + '</div>' +
    '<div class="p-subtitle">' + r.subtitle + '</div>' +
    '<div class="p-year-badge">DATA YEAR: ' + displayedYear + '</div>' +
    '<div class="p-wqi-block">' +
      '<div class="p-wqi-num" style="color:' + col + '">' + wqi + '</div>' +
      '<div class="p-wqi-label" style="color:' + col + '">' + wqiLabel(wqi) + '</div>' +
    '</div>' +
    '<div class="p-divider"></div>' +
    '<div class="p-section-title">Water Quality Parameters</div>' +
    paramHtml +
    '<div class="p-divider"></div>' +
    '<div class="p-section-title">Seasonal WQI Variation (Jan – Dec)</div>' +
    seasonSvg +
    '<div class="month-row"><span>Jan</span><span>Mar</span><span>May</span><span>Jul</span><span>Sep</span><span>Nov</span></div>' +
    '<div class="p-divider"></div>' +
    '<div class="p-section-title">Downstream Impact</div>' +
    citiesHtml +
    '<div class="rec-box" style="border-left-color:' + col + '">' +
      wqiAdvice(wqi, r.name) +
    '</div>';

  var panel = document.getElementById("river-panel");
  panel.classList.add("open");
  panel.setAttribute("aria-hidden", "false");
}

/* ============================================================
   CLOSE PANEL
   ============================================================ */
function closePanel(){
  var panel = document.getElementById("river-panel");
  panel.classList.remove("open");
  panel.setAttribute("aria-hidden", "true");

  if (selectedId){
    unhighlightAll();
    selectedId = null;
  }
  clearFlowArrows();
}

document.getElementById("panel-close-btn").addEventListener("click", closePanel);

/* ============================================================
   UNIFIED MAP CLICK + HOVER
   One handler queries the invisible hit layers: clicking a river
   selects it, clicking empty map closes the panel. No event
   double-firing (the old Leaflet version needed stopPropagation).
   ============================================================ */
var hitLayerIds = riverIds.map(function(id){ return "hit-" + id; });
var hoveredId = null;

map.on("click", function(e){
  if (currentMode !== "water"){ closePanel(); return; }
  var feats = map.queryRenderedFeatures(e.point, { layers: hitLayerIds });
  if (feats.length){
    var id = feats[0].layer.id.replace("hit-", "");
    onRiverClick(id, e.lngLat);
  } else {
    closePanel();
  }
});

map.on("mousemove", function(e){
  if (currentMode !== "water") return;
  var feats = map.queryRenderedFeatures(e.point, { layers: hitLayerIds });
  var id = feats.length ? feats[0].layer.id.replace("hit-", "") : null;

  if (id !== hoveredId){
    // restore the previously hovered river
    if (hoveredId && hoveredId !== selectedId){
      map.setPaintProperty("core-" + hoveredId, "line-width", 3.5);
      map.setPaintProperty("glow-" + hoveredId, "line-opacity", 0.35);
      var oldLb = document.getElementById("label-" + hoveredId);
      if (oldLb) oldLb.classList.remove("lit");
    }
    // light up the new one
    if (id && id !== selectedId){
      map.setPaintProperty("core-" + id, "line-width", 5);
      map.setPaintProperty("glow-" + id, "line-opacity", 0.6);
    }
    if (id){
      var lb = document.getElementById("label-" + id);
      if (lb) lb.classList.add("lit");
    }
    map.getCanvas().style.cursor = id ? "pointer" : "";
    hoveredId = id;
  }
});

/* ============================================================
   DISEASE OUTBREAK LAYER
   ============================================================ */
function showOutbreakLayer(){
  riverIds.forEach(function(k){
    map.setPaintProperty("core-"  + k, "line-opacity", 0.15);
    map.setPaintProperty("glow-"  + k, "line-opacity", 0.05);
    map.setPaintProperty("pulse-" + k, "line-opacity", 0);
    var lb = document.getElementById("label-" + k);
    if (lb) lb.style.opacity = 0.15;
  });
  endpointMarkers.forEach(function(m){ m.getElement().style.opacity = 0.15; });

  outbreakData.forEach(function(ob, i){
    var s = outbreakStyle(ob.severity);
    var el = document.createElement("div");
    el.className = "outbreak-blob";
    el.style.width  = (s.r * 2) + "px";
    el.style.height = (s.r * 2) + "px";
    el.style.background = "radial-gradient(" + s.bg + " 0%, transparent 70%)";
    el.style.animationDelay = (i * 0.28).toFixed(2) + "s";

    el.addEventListener("click", function(ev){
      ev.stopPropagation();
      showOutbreakPanel(ob);
    });

    outbreakMarkers.push(
      new maplibregl.Marker({ element: el })
        .setLngLat([ob.lng, ob.lat])
        .addTo(map)
    );
  });

  updateLegend("disease");
  document.getElementById("mode-label").textContent = "🔴 Disease Outbreak View";
}

function hideOutbreakLayer(){
  outbreakMarkers.forEach(function(m){ m.remove(); });
  outbreakMarkers = [];

  riverIds.forEach(function(id){
    map.setPaintProperty("core-"  + id, "line-opacity", 0.95);
    map.setPaintProperty("glow-"  + id, "line-opacity", 0.35);
    map.setPaintProperty("pulse-" + id, "line-opacity", 0.9);
    var lb = document.getElementById("label-" + id);
    if (lb) lb.style.opacity = "";
  });
  endpointMarkers.forEach(function(m){ m.getElement().style.opacity = ""; });
  applyYear();

  updateLegend("water");
  document.getElementById("mode-label").textContent = "💧 Water Quality View";
}

/* ============================================================
   DISEASE OUTBREAK PANEL
   ============================================================ */
function showOutbreakPanel(ob){
  var sevCol = ob.severity === "high" ? "#e05252" : ob.severity === "medium" ? "#e0954a" : "#D4A017";

  document.getElementById("panel-content").innerHTML =
    '<div class="p-disease-name">' + ob.disease.toUpperCase() + '</div>' +
    '<div class="p-crop-tag">CROP: ' + ob.crop.toUpperCase() + '</div>' +
    '<div class="p-year-badge" style="margin-bottom:18px">' + ob.location + '</div>' +
    '<div class="p-section-title">Reports This Week</div>' +
    '<div class="p-wqi-block" style="margin-bottom:10px">' +
      '<div class="p-report-count" style="color:' + sevCol + '">' + ob.reports + '</div>' +
      '<div class="trend-chip ' + (ob.trendUp ? "trend-up" : "trend-down") + '" style="margin-bottom:6px">' +
        (ob.trendUp ? "↑ " : "↓ ") + ob.trend + ' vs last week' +
      '</div>' +
    '</div>' +
    '<div class="p-divider"></div>' +
    '<div class="p-section-title">Severity Level</div>' +
    '<div style="display:inline-block;padding:5px 14px;border-radius:8px;font-size:11px;font-weight:600;' +
         'text-transform:uppercase;letter-spacing:.12em;background:rgba(224,82,82,.1);color:' + sevCol + ';margin-bottom:18px">' +
      ob.severity.toUpperCase() +
    '</div>' +
    '<div class="p-divider"></div>' +
    '<div class="p-section-title">Field Advisory</div>' +
    '<div class="rec-box" style="border-left-color:' + sevCol + '">' +
      getOutbreakAdvice(ob.disease) +
    '</div>';

  var panel = document.getElementById("river-panel");
  panel.classList.add("open");
  panel.setAttribute("aria-hidden", "false");
}

/* ============================================================

updateLegend("water");

/* ============================================================
   LAYER TOGGLE HANDLERS
   ============================================================ */
document.getElementById("btn-water").addEventListener("click", function(){
  if (currentMode === "water") return;
  currentMode = "water";
  hideOutbreakLayer();
  this.classList.add("active");
  this.setAttribute("aria-pressed", "true");
  document.getElementById("btn-disease").classList.remove("active");
  document.getElementById("btn-disease").setAttribute("aria-pressed", "false");
  closePanel();
});

document.getElementById("btn-disease").addEventListener("click", function(){
  if (currentMode === "disease") return;
  currentMode = "disease";
  showOutbreakLayer();
  this.classList.add("active");
  this.setAttribute("aria-pressed", "true");
  document.getElementById("btn-water").classList.remove("active");
  document.getElementById("btn-water").setAttribute("aria-pressed", "false");
  closePanel();
});

document.getElementById("btn-mobile-toggle").addEventListener("click", function(){
  if (currentMode === "water"){
    currentMode = "disease";
    showOutbreakLayer();
    this.textContent = "💧";
  } else {
    currentMode = "water";
    hideOutbreakLayer();
    this.textContent = "🗺️";
  }
  closePanel();
});

/* ============================================================
   CAMERA CONTROLS — smooth eased zoom, compass reset, 2D/3D
   ============================================================ */
function smoothZoom(delta){
  map.easeTo({
    zoom: map.getZoom() + delta,
    duration: reducedMotion ? 0 : 650,
    easing: function(t){ return 1 - Math.pow(1 - t, 3); }   // cubic ease-out
  });
}
document.getElementById("zoom-in").addEventListener("click",  function(){ smoothZoom(+1); });
document.getElementById("zoom-out").addEventListener("click", function(){ smoothZoom(-1); });

// compass — resets bearing to north (keeps current pitch)
document.getElementById("compass-btn").addEventListener("click", function(){
  map.easeTo({ bearing: 0, duration: reducedMotion ? 0 : 900, easing: function(t){ return 1 - Math.pow(1 - t, 3); } });
});

// the needle mirrors the live bearing so users always know where north is
map.on("rotate", function(){
  document.getElementById("compass-needle").style.transform =
    "rotate(" + (-map.getBearing()) + "deg)";
});

// 2D / 3D toggle — flattens or restores the pitch
var is3D = true;
document.getElementById("tilt-btn").addEventListener("click", function(){
  is3D = !is3D;
  this.textContent = is3D ? "3D" : "2D";
  map.easeTo({
    pitch: is3D ? START_PITCH : 0,
    duration: reducedMotion ? 0 : 1100,
    easing: function(t){ return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2; }
  });
});

/* ============================================================
   AMBIENT RIVER PULSE — a random river glows brighter every
   4 seconds (paint transitions animate it GPU-side)
   ============================================================ */
function startAmbientPulse(){
  if (reducedMotion) return;
  setInterval(function(){
    if (currentMode !== "water") return;
    var pick = riverIds[Math.floor(Math.random() * riverIds.length)];
    if (pick === selectedId || pick === hoveredId) return;

    map.setPaintProperty("core-" + pick, "line-width", 5.5);
    map.setPaintProperty("glow-" + pick, "line-opacity", 0.65);
    setTimeout(function(){
      if (pick !== selectedId && pick !== hoveredId && currentMode === "water"){
        map.setPaintProperty("core-" + pick, "line-width", 3.5);
        map.setPaintProperty("glow-" + pick, "line-opacity", 0.35);
      }
    }, 800);
  }, 4000);
}

/* ============================================================
   ROTATE HINT — device-appropriate copy, fades after 9s
   ============================================================ */
(function rotateHint(){
  var hint = document.getElementById("rotate-hint");
  hint.innerHTML = isMobile
    ? "🌏 <b>Two-finger twist</b> to rotate · <b>two-finger drag</b> to tilt"
    : "🌏 <b>Right-drag</b> (or Ctrl+drag) to rotate & tilt · <b>scroll</b> to zoom";
  setTimeout(function(){ hint.style.opacity = "0"; }, 9000);
})();

/* ============================================================
   INTRO SEQUENCE — loader fades, rivers fade+grow in staggered,
   and the camera performs an opening swoop from a high orbit
   down into the tilted 3D view of the subcontinent.
   ============================================================ */
(function initLoader(){
  var title = document.getElementById("loading-title");
  var text = title.textContent;
  title.innerHTML = text.split("").map(function(ch){
    return '<span class="lt-ch">' + (ch === " " ? "&nbsp;" : ch) + '</span>';
  }).join("");
  if (!reducedMotion){
    gsap.to("#loading-title .lt-ch", {
      opacity: 1, y: 0, duration: 0.6, ease: "power3.out",
      stagger: 0.035, delay: 0.1
    });
  } else {
    gsap.set("#loading-title .lt-ch", { opacity: 1, y: 0 });
  }

  var bar = document.getElementById("load-bar");
  var progress = 0;
  var ticker = setInterval(function(){
    progress = Math.min(progress + Math.random() * 15, 90);
    bar.style.width = progress + "%";
  }, 100);

  map.on("load", function(){
    clearInterval(ticker);
    bar.style.width = "100%";

    addRiverLayers();
    addMarkers();
    applyYear();
    startFlowAnimation();
    startAmbientPulse();

    setTimeout(function(){
      var screen = document.getElementById("loading-screen");
      screen.classList.add("fade-out");
      setTimeout(function(){ screen.style.display = "none"; }, 900);

      // opening camera swoop: zoomed-out flat → tilted 3D over India
      if (!reducedMotion){
        map.flyTo({
          center: [80.5, 22.5],
          zoom: isMobile ? 4.1 : 4.7,
          pitch: START_PITCH,
          bearing: -8,
          duration: 3400,
          curve: 1.3,
          essential: true
        });
      }

      // rivers fade + grow in, staggered north to south
      riverIds.forEach(function(id, i){
        setTimeout(function(){
          map.setPaintProperty("core-"  + id, "line-opacity", 0.95);
          map.setPaintProperty("glow-"  + id, "line-opacity", 0.35);
          map.setPaintProperty("pulse-" + id, "line-opacity", 0.9);
        }, reducedMotion ? 0 : 500 + i * 220);
      });
    }, reducedMotion ? 0 : 450);
  });
})();

})(); // end IIFE
</script>
